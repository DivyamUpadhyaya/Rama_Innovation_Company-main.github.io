<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Verification Profile</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 40px 20px; background-color: #f4f6f9; color: #333; }
        .profile-card { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 8px 16px rgba(0,0,0,0.08); max-width: 550px; width: 100%; text-align: left; box-sizing: border-box; }
        
        .photo-container { text-align: center; margin-bottom: 20px; }
        .profile-photo { width: 135px; height: 135px; border-radius: 50%; object-fit: cover; border: 3px solid #2196F3; background-color: #eaeaea; display: inline-block; }
        
        h2 { color: #1a1a1a; margin: 10px 0 5px 0; text-align: center; font-size: 24px; }
        .verification-status { text-align: center; margin-bottom: 25px; }
        .status-badge { font-weight: bold; color: #2e7d32; background-color: #e8f5e9; padding: 6px 16px; border-radius: 20px; display: inline-block; font-size: 14px; }
        
        .detail-section { border-top: 1px solid #edf2f7; padding: 12px 0; display: flex; flex-direction: column; }
        .label { font-size: 11px; color: #718096; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.5px; }
        .value { font-size: 15px; color: #2d3748; font-weight: 500; word-break: break-word; }
        
        .links-row { display: flex; gap: 15px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; }
        .btn-linkedin { background-color: #0077b5; color: white; }
        .btn-github { background-color: #24292e; color: white; }
        
        .loading { font-style: italic; color: #718096; text-align: center; padding: 20px; }
        .error { color: #e53e3e; background-color: #fff5f5; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; border: 1px solid #fed7d7; }
    </style>
</head>
<body>

<div class="profile-card">
    <div id="loader" class="loading">Verifying credentials...</div>
    
    <div id="profile-content" style="display: none;">
        <div class="photo-container">
            <img id="intern-photo" class="profile-photo" src="" alt="Student Photograph" style="display: none;">
        </div>
        <h2 id="intern-name">Loading...</h2>
        <div class="verification-status">
            <span class="status-badge">✓ Verified Rama Innovation Intern</span>
        </div>
        
        <div class="detail-section">
            <div class="label">Internship Domain</div>
            <div id="intern-domain" class="value">N/A</div>
        </div>
        <div class="detail-section">
            <div class="label">Duration</div>
            <div id="intern-duration" class="value">N/A</div>
        </div>

        <div class="detail-section">
            <div class="label">College / University</div>
            <div id="intern-college" class="value">N/A</div>
        </div>
        <div class="detail-section">
            <div class="label">Branch</div>
            <div id="intern-branch" class="value">N/A</div>
        </div>

        <div class="detail-section">
            <div class="label">Personal Email Address</div>
            <div id="intern-personal-email" class="value">N/A</div>
        </div>
        <div class="detail-section">
            <div class="label">College Email ID</div>
            <div id="intern-college-email" class="value">N/A</div>
        </div>

        <div class="links-row">
            <a id="link-linkedin" class="btn btn-linkedin" href="#" target="_blank" style="display: none;">LinkedIn Profile</a>
            <a id="link-github" class="btn btn-github" href="#" target="_blank" style="display: none;">GitHub Profile</a>
        </div>
    </div>
    
    <div id="error-message" class="error" style="display: none;"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const internName = urlParams.get('intern');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwzHOLrRl1D3H7kzqoCgTqVIxDAq7c-N2R2fbAZOwNsHJH3jM2S_jJpmfm72CfdJwE2sQ/exec";

    if (internName) {
        fetch(`${scriptUrl}?intern=${encodeURIComponent(internName)}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('loader').style.display = 'none';
                
                if (data.status === "success") {
                    const sheetData = data.data;

                    // Text Fields Mapping
                    document.getElementById('intern-name').innerText = sheetData["Full Name (Use CAPITAL LETTERS only)"] || internName;
                    document.getElementById('intern-personal-email').innerText = sheetData["Personal Email Address"] || "N/A";
                    document.getElementById('intern-college').innerText = sheetData["College/University Name (Please enter the full official name of your institution)"] || "N/A";
                    document.getElementById('intern-branch').innerText = sheetData["Branch"] || "N/A";
                    document.getElementById('intern-college-email').innerText = sheetData["College Email ID (Please enter your official college email address)"] || "N/A";
                    document.getElementById('intern-domain').innerText = sheetData["Select Your Preferred Internship Domain (Choose the domain you wish to enroll in)"] || "N/A";
                    document.getElementById('intern-duration').innerText = sheetData["Select Internship Duration (Choose your preferred internship duration)"] || "N/A";
                    
                    // Improved Profile Photo Link Extractor
                    let rawPhotoUrl = sheetData["Upload Student Photograph (Please upload a recent passport-size photograph)"];
                    if (rawPhotoUrl && rawPhotoUrl.trim() !== "") {
                        let fileId = "";
                        if (rawPhotoUrl.includes("id=")) {
                            fileId = rawPhotoUrl.split("id=")[1].split("&")[0];
                        } else if (rawPhotoUrl.includes("/d/")) {
                            fileId = rawPhotoUrl.split("/d/")[1].split("/")[0];
                        }
                        
                        if (fileId) {
                            document.getElementById('intern-photo').src = `https://docs.google.com/uc?export=view&id=${fileId}`;
                            document.getElementById('intern-photo').style.display = "inline-block";
                        }
                    }

                    // Flexible Social Link Filters (Matches column names by looking for partial string parts to prevent syntax mismatching)
                    Object.keys(sheetData).forEach(key => {
                        let cleanKey = key.toLowerCase();
                        let value = sheetData[key];
                        
                        if (value && value.toString().trim() !== "" && value.toString().toLowerCase() !== "n/a") {
                            if (cleanKey.includes("linkedin profile link")) {
                                document.getElementById('link-linkedin').href = value.toString().trim();
                                document.getElementById('link-linkedin').style.display = "inline-flex";
                            }
                            if (cleanKey.includes("github profile link")) {
                                document.getElementById('link-github').href = value.toString().trim();
                                document.getElementById('link-github').style.display = "inline-flex";
                            }
                        }
                    });
                    
                    document.getElementById('profile-content').style.display = 'block';
                } else {
                    document.getElementById('error-message').innerText = "Verification Failed: Record not found.";
                    document.getElementById('error-message').style.display = 'block';
                }
            })
            .catch(error => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('error-message').innerText = "Connection Error: Failed to access verification database.";
                document.getElementById('error-message').style.display = 'block';
                console.error(error);
            });
    } else {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('error-message').innerText = "Invalid Request: No intern specified.";
        document.getElementById('error-message').style.display = 'block';
    }
</script>

</body>
</html>
