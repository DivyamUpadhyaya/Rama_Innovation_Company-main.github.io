<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Profile | Rama Innovation</title>
    <link rel="stylesheet" href="../css/style.css"> 
    <style>
        .profile-page-container { padding: 80px 20px; background-color: #f8fafc; min-height: 70vh; display: flex; justify-content: center; }
        .profile-card { background: white; padding: 40px; border-radius: 20px; max-width: 500px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .profile-photo { width: 140px; height: 140px; border-radius: 12px; object-fit: cover; display: block; margin: 0 auto; }
        .detail-section { border-top: 1px solid #edf2f7; padding: 12px 0; }
        .label { font-size: 11px; color: #718096; text-transform: uppercase; font-weight: 700; }
        .value { font-size: 15px; color: #2d3748; font-weight: 500; }
        .error { color: #e53e3e; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar"> </nav>

    <div class="profile-page-container">
        <div class="profile-card">
            <div id="loader">Verifying credentials...</div>
            <div id="profile-content" style="display: none;">
                <img id="intern-photo" class="profile-photo" src="" alt="Photo">
                <h2 id="intern-name" style="text-align:center;"></h2>
                <div class="detail-section"><div class="label">Domain</div><div id="intern-domain" class="value"></div></div>
                <div class="detail-section"><div class="label">College</div><div id="intern-college" class="value"></div></div>
                </div>
            <div id="error-message" class="error" style="display: none;"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const internName = urlParams.get('intern');
        const scriptUrl = "YOUR_GOOGLE_SCRIPT_URL_HERE"; 

        fetch(`${scriptUrl}?intern=${encodeURIComponent(internName)}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loader').style.display = 'none';
                if (data.status !== "success") {
                    document.getElementById('error-message').innerText = "Intern not found. Please check the name spelling.";
                    document.getElementById('error-message').style.display = 'block';
                    return;
                }

                const s = data.data;
                // Use .trim().toUpperCase() to ensure matching
                document.getElementById('intern-name').innerText = s['Full Name'] || 'N/A';
                document.getElementById('intern-domain').innerText = s['Preferred Internship Domain'] || 'N/A';
                document.getElementById('intern-college').innerText = s['College/University Name'] || 'N/A';
                document.getElementById('profile-content').style.display = 'block';
            })
            .catch(err => {
                document.getElementById('error-message').innerText = "Connection failed.";
                document.getElementById('error-message').style.display = 'block';
            });
    </script>
</body>
</html>
